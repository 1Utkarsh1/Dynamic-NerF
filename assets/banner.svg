<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="900" height="220">
  <defs>
    <!-- Deep space gradient background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <!-- Glowing accent gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textglow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="220" fill="url(#bgGrad)" rx="14"/>

  <!-- Animated stars -->
  <g opacity="0.6">
    <circle cx="50" cy="30" r="1.2" fill="white"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.1s" repeatCount="indefinite"/></circle>
    <circle cx="120" cy="60" r="0.8" fill="white"><animate attributeName="opacity" values="1;0.2;1" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="200" cy="20" r="1.5" fill="#a5b4fc"><animate attributeName="opacity" values="0.5;1;0.5" dur="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="310" cy="45" r="1" fill="white"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="2.7s" repeatCount="indefinite"/></circle>
    <circle cx="420" cy="15" r="1.2" fill="#c4b5fd"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="4.1s" repeatCount="indefinite"/></circle>
    <circle cx="550" cy="35" r="0.9" fill="white"><animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="660" cy="50" r="1.3" fill="#67e8f9"><animate attributeName="opacity" values="1;0.3;1" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="780" cy="25" r="1" fill="white"><animate attributeName="opacity" values="0.6;1;0.6" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="850" cy="60" r="1.4" fill="#a5b4fc"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="1.9s" repeatCount="indefinite"/></circle>
    <circle cx="75" cy="170" r="1.1" fill="white"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="3.8s" repeatCount="indefinite"/></circle>
    <circle cx="175" cy="190" r="0.8" fill="#c4b5fd"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.3s" repeatCount="indefinite"/></circle>
    <circle cx="820" cy="175" r="1.2" fill="white"><animate attributeName="opacity" values="0.9;0.3;0.9" dur="2.9s" repeatCount="indefinite"/></circle>
    <circle cx="870" cy="150" r="0.9" fill="#67e8f9"><animate attributeName="opacity" values="0.4;1;0.4" dur="1.7s" repeatCount="indefinite"/></circle>
    <circle cx="30" cy="100" r="1" fill="#a5b4fc"><animate attributeName="opacity" values="1;0.3;1" dur="4.5s" repeatCount="indefinite"/></circle>
    <circle cx="890" cy="100" r="0.8" fill="white"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.2s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Floating 3D grid lines (perspective effect) -->
  <g opacity="0.12" stroke="#6366f1" stroke-width="0.8" fill="none">
    <!-- Horizontal lines converging to center -->
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="75" x2="900" y2="75"/>
    <line x1="0" y1="125" x2="900" y2="125"/>
    <line x1="0" y1="50" x2="900" y2="50"/>
    <line x1="0" y1="150" x2="900" y2="150"/>
    <!-- Vertical lines -->
    <line x1="100" y1="0" x2="100" y2="220"/>
    <line x1="200" y1="0" x2="200" y2="220"/>
    <line x1="700" y1="0" x2="700" y2="220"/>
    <line x1="800" y1="0" x2="800" y2="220"/>
  </g>

  <!-- Animated pulsing orbs (neural nodes) -->
  <!-- Left cluster -->
  <circle cx="130" cy="100" r="28" fill="#6366f1" opacity="0.08" filter="url(#softglow)">
    <animate attributeName="r" values="28;38;28" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.08;0.16;0.08" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="130" cy="100" r="14" fill="none" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.4" filter="url(#glow)">
    <animate attributeName="r" values="14;20;14" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Right cluster -->
  <circle cx="770" cy="100" r="28" fill="#06b6d4" opacity="0.08" filter="url(#softglow)">
    <animate attributeName="r" values="28;38;28" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.08;0.16;0.08" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="770" cy="100" r="14" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.4" filter="url(#glow)">
    <animate attributeName="r" values="14;20;14" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Connecting animated line between orbs -->
  <line x1="144" y1="100" x2="756" y2="100" stroke="url(#accentGrad)" stroke-width="1" opacity="0.3" stroke-dasharray="6,4">
    <animate attributeName="stroke-dashoffset" values="0;-100" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite"/>
  </line>

  <!-- Animated accent bar at top -->
  <rect x="0" y="0" width="900" height="3" fill="url(#accentGrad)" rx="14" opacity="0.9"/>

  <!-- Animated accent bar at bottom -->
  <rect x="0" y="217" width="900" height="3" fill="url(#accentGrad)" rx="14" opacity="0.6"/>

  <!-- Main Title -->
  <text x="450" y="105" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="54" font-weight="800" fill="white" text-anchor="middle"
        letter-spacing="-1" filter="url(#textglow)">
    Dynamic<tspan fill="url(#accentGrad)">NeRF</tspan>
  </text>

  <!-- Subtitle -->
  <text x="450" y="145" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="16" font-weight="400" fill="#a5b4fc" text-anchor="middle"
        letter-spacing="3" opacity="0.9">
    NEURAL RADIANCE FIELDS FOR DYNAMIC SCENES
  </text>

  <!-- Decorative dots row -->
  <g fill="url(#accentGrad)" opacity="0.7">
    <circle cx="390" cy="170" r="2.5"/>
    <circle cx="410" cy="170" r="2.5"/>
    <circle cx="430" cy="170" r="2.5"/>
    <circle cx="450" cy="170" r="3" filter="url(#glow)"/>
    <circle cx="470" cy="170" r="2.5"/>
    <circle cx="490" cy="170" r="2.5"/>
    <circle cx="510" cy="170" r="2.5"/>
  </g>

  <!-- Bottom tag -->
  <text x="450" y="200" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="12" fill="#67e8f9" text-anchor="middle" opacity="0.7" letter-spacing="1">
    Novel View Synthesis · Temporal Encoding · Spatio-Temporal Attention
  </text>
</svg>
